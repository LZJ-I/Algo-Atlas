<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>

  <!-- 装饰性几何图形 -->
  <circle cx="100" cy="80" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="320" r="60" fill="rgba(255,255,255,0.05)"/>
  <rect x="50" y="300" width="80" height="80" rx="8" fill="rgba(255,255,255,0.08)"/>
  <rect x="650" y="50" width="60" height="60" rx="6" fill="rgba(255,255,255,0.06)"/>

  <!-- 主要内容区域 -->
  <g transform="translate(400, 200)">
    <!-- 算法图标 - 简化的数据结构表示 -->
    <g transform="translate(-200, -50)">
      <!-- 二叉树结构 -->
      <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.9"/>
      <circle cx="-30" cy="40" r="6" fill="#fff" opacity="0.8"/>
      <circle cx="30" cy="40" r="6" fill="#fff" opacity="0.8"/>
      <circle cx="-45" cy="80" r="5" fill="#fff" opacity="0.7"/>
      <circle cx="-15" cy="80" r="5" fill="#fff" opacity="0.7"/>
      <circle cx="15" cy="80" r="5" fill="#fff" opacity="0.7"/>
      <circle cx="45" cy="80" r="5" fill="#fff" opacity="0.7"/>

      <!-- 连接线 -->
      <line x1="0" y1="0" x2="-30" y2="40" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="0" x2="30" y2="40" stroke="#fff" stroke-width="2" opacity="0.6"/>
      <line x1="-30" y1="40" x2="-45" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-30" y1="40" x2="-15" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="40" x2="15" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="40" x2="45" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- 代码符号 -->
    <g transform="translate(160, -30)">
      <rect x="0" y="0" width="60" height="4" rx="2" fill="#fff" opacity="0.8"/>
      <rect x="0" y="10" width="40" height="4" rx="2" fill="#fff" opacity="0.6"/>
      <rect x="0" y="20" width="50" height="4" rx="2" fill="#fff" opacity="0.7"/>
      <rect x="0" y="30" width="35" height="4" rx="2" fill="#fff" opacity="0.5"/>
      <rect x="0" y="40" width="45" height="4" rx="2" fill="#fff" opacity="0.6"/>
    </g>
  </g>

  <!-- 标题 -->
  <text x="400" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" filter="url(#shadow)">
    Algo-Atlas
  </text>

  <!-- 副标题 -->
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#fff" opacity="0.9">
    从零开始的算法学习之路
  </text>

  <!-- 描述文字 -->
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff" opacity="0.8">
    LeetCode 题解 · 算法思维 · 代码实现
  </text>

  <!-- 底部装饰线 -->
  <line x1="200" y1="350" x2="600" y2="350" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="350" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="600" cy="350" r="4" fill="#fff" opacity="0.8"/>

  <!-- 版本信息 -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" opacity="0.6">
    Re:Algo - Starting Algorithms from Zero
  </text>
</svg>